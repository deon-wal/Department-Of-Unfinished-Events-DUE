<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STATION_04 // SIGIL_EXTRACTOR</title>
    <style>
        :root {
            /* 1. Color Correction to D.U.E. Standards */
            --tobacco-orange: #704214;
            --void-black: #050505;
            --phosphor-red: #FF3131;
            --cyan-suture: #22d3ee;
            --terminal-green: #22c55e;
            --blood-ink: #630000;
            --vellum-gold: #f2e6d0;
        }

        /* 2. Full-Screen Immersion */
        body {
            background-color: var(--void-black);
            color: var(--vellum-gold);
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* 3. Global Texture */
            background-image: radial-gradient(circle, #0a0a0a 0%, #000 100%);
        }

        /* 4. Large-Scale App Chassis */
        .app-container {
            width: 90vw;
            max-width: 800px; /* 5. Size Increase */
            height: 80vh;
            border: 1px solid var(--tobacco-orange);
            background: var(--void-black);
            display: grid;
            grid-template-rows: 40px 1fr 180px 60px;
            position: relative;
            box-shadow: 0 0 50px rgba(112, 66, 20, 0.2);
        }

        /* 6. Scanline Overlay */
        .app-container::after {
            content: ""; position: absolute; inset: 0; pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: 100; opacity: 0.3;
        }

        /* 7. Animated Header */
        .header {
            background: var(--tobacco-orange);
            color: var(--void-black);
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 3px;
        }

        /* 8. The "God-Eye" Viewport */
        .viewport {
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        /* 9. High-Visibility Output */
        #sigil-display {
            font-size: 3.5rem; /* 10. Massive font */
            color: var(--cyan-suture);
            text-shadow: 0 0 20px var(--cyan-suture);
            letter-spacing: 10px;
            text-transform: uppercase;
            transition: all 0.1s;
        }

        /* 11. Narrative Ballast / Weight Counter */
        .debt-counter {
            font-size: 10px;
            color: var(--phosphor-red);
            margin-top: 20px;
        }

        /* 12. Improved Control Grid */
        .control-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 30px;
            background: #080808;
        }

        /* 13. Stylized Toggle Switches */
        .vault-check {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            border: 1px solid #222;
            padding: 10px;
            transition: 0.2s;
        }

        .vault-check:hover { border-color: var(--cyan-suture); }

        .vault-check input { display: none; }

        .indicator {
            width: 12px; height: 12px; border: 1px solid #444;
        }

        input:checked + .indicator {
            background: var(--phosphor-red);
            box-shadow: 0 0 10px var(--phosphor-red);
        }

        /* 14. Tactile Extraction Button */
        .extract-btn {
            background: var(--blood-ink);
            color: white;
            border: 1px solid var(--phosphor-red);
            font-family: 'Courier New';
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .extract-btn:active { transform: translateY(2px); background: var(--phosphor-red); }

        /* 15. The "History" Shards */
        .history-tray {
            display: flex;
            gap: 10px;
            font-size: 9px;
            color: #444;
            padding: 10px;
            background: #000;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <span>CORE_SIGIL_EXTRACTOR // STATION_04</span>
        <span id="clock">00:00:00</span>
    </div>

    <div class="viewport">
        <div id="sigil-display">NO_DATA</div>
        <div class="debt-counter">RESOLUTION_DEBT: <span id="debt-val">0.00</span>%</div>
    </div>

    <div class="control-grid">
        <label class="vault-check">
            <input type="checkbox" class="vault" data-type="upper" checked>
            <div class="indicator"></div>
            <span>[SHARDS] UPPER_CASE</span>
        </label>
        <label class="vault-check">
            <input type="checkbox" class="vault" data-type="num" checked>
            <div class="indicator"></div>
            <span>[STATIC] NUMERIC</span>
        </label>
        <label class="vault-check">
            <input type="checkbox" class="vault" data-type="sym">
            <div class="indicator"></div>
            <span>[SUTURE] SYMBOLS</span>
        </label>
        <label class="vault-check">
            <input type="checkbox" class="vault" data-type="lore">
            <div class="indicator"></div>
            <span>[DEBT] ANCIENT</span>
        </label>
        <button class="extract-btn" style="grid-column: span 2;" onclick="Extractor.init()">INITIATE_EXTRACTION</button>
    </div>

    <div class="history-tray" id="history">
        <span>PREVIOUS_SIGILS:</span>
    </div>
</div>

<script>
    const Extractor = {
        debt: 0.00,
        vaults: {
            upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
            lower: "abcdefghijklmnopqrstuvwxyz",
            num: "0123456789",
            sym: "!@#$%^&*()_+=",
            lore: "ΩΨΦΣΔΞϘϞ"
        },

        // 19. System Clock logic
        tick() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        },

        init() {
            let pool = this.vaults.lower;
            document.querySelectorAll('.vault').forEach(t => { if(t.checked) pool += this.vaults[t.dataset.type]; });

            // 20. Variable Sigil Length
            const length = Math.floor(Math.random() * 5) + 12; 
            let result = "";
            for(let i=0; i<length; i++) {
                result += pool[Math.floor(Math.random() * pool.length)];
            }

            this.animate(result);
        },

        animate(final) {
            const display = document.getElementById('sigil-display');
            let frames = 0;
            
            // 21. High-Entropy Glitch Animation
            const interval = setInterval(() => {
                display.innerText = Math.random().toString(36).substring(2, 8).toUpperCase();
                display.style.color = "var(--phosphor-red)";
                frames++;

                if(frames > 20) { // 22. Rule #2: The 99% Threshold delay
                    clearInterval(interval);
                    display.innerText = final;
                    display.style.color = "var(--cyan-suture)";
                    this.updateDebt();
                    this.log(final);
                    // 23. Auto-copy to buffer
                    navigator.clipboard.writeText(final);
                }
            }, 40);
        },

        updateDebt() {
            this.debt += 0.88;
            document.getElementById('debt-val').innerText = this.debt.toFixed(2);
        },

        log(sigil) {
            const h = document.getElementById('history');
            const item = document.createElement('span');
            item.innerText = `[${sigil}] `;
            h.appendChild(item);
            if(h.children.length > 5) h.removeChild(h.children[1]);
        }
    };

    setInterval(Extractor.tick, 1000);
</script>

</body>
</html>
